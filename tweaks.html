<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyanide JS Tweaks — zeroxjf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="JavaScript tweaks for Cyanide iOS tweak runner.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root {
      --bg: #ffffff; --fg: #0a0a0a; --muted: #71717a; --border: #e5e5e7;
      --accent: rgba(0,0,0,0.045); --accent-strong: rgba(0,0,0,0.08);
      --code-bg: #f4f4f5;
      --font-sans: "SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
      --font-mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg: #0a0a0a; --fg: #fafafa; --muted: #a1a1aa; --border: #27272a;
        --accent: rgba(255,255,255,0.06); --accent-strong: rgba(255,255,255,0.1);
        --code-bg: #18181b;
      }
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-sans); background: var(--bg); color: var(--fg);
      min-height: 100vh; line-height: 1.5;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }

    .container { max-width: 42rem; margin: 0 auto; padding: 4rem 1.5rem 3rem; }

    .back { color: var(--muted); font-size: 0.875rem; display: inline-block; margin-bottom: 1.5rem; transition: color 120ms; }
    .back:hover { color: var(--fg); }

    h1 { font-size: 1.875rem; font-weight: 500; letter-spacing: -0.01em; }
    .subtitle { color: var(--muted); margin-top: 0.25rem; margin-bottom: 0.5rem; }

    .repo-url {
      font-family: var(--font-mono); font-size: 0.85rem; color: var(--fg);
      background: var(--code-bg); padding: 0.5rem 0.75rem; border-radius: 6px;
      user-select: all; margin-bottom: 2rem; display: block;
    }

    .loading { color: var(--muted); padding: 2rem 0; }

    .tweak-card {
      border: 1px solid var(--border); border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem;
      transition: background 120ms;
    }
    .tweak-card:hover { background: var(--accent); }

    .tweak-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.25rem; }
    .tweak-name { font-size: 1.125rem; font-weight: 500; }
    .tweak-version { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); }
    .tweak-author { font-size: 0.875rem; color: var(--muted); margin-bottom: 0.5rem; }
    .tweak-desc { font-size: 0.9375rem; color: color-mix(in srgb, var(--fg) 75%, transparent); line-height: 1.55; margin-bottom: 0.75rem; }

    .tweak-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tweak-btn {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.4rem 0.75rem; border-radius: 6px;
      background: var(--accent); font-size: 0.8125rem; font-weight: 500;
      transition: background 120ms;
    }
    .tweak-btn:hover { background: var(--accent-strong); }
    .tweak-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .footer-text { font-size: 0.8125rem; color: var(--muted); }
    .footer-text a { box-shadow: 0 1px 0 var(--border); }
    .footer-text a:hover { box-shadow: 0 1px 0 var(--fg); }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">← zeroxjf</a>
    <h1>Cyanide JS Tweaks</h1>
    <p class="subtitle">JavaScript tweaks for the zeroxjf repo. Add this source in Cyanide:</p>
    <div class="repo-url">https://zeroxjf.github.io/cyanide-repotweaks.json</div>

    <div id="tweaks"><div class="loading">Loading tweaks…</div></div>

    <div class="footer">
      <p class="footer-text">These tweaks run through <a href="https://github.com/zeroxjf/cyanide">Cyanide</a>'s SpringBoard JavaScript bridge. Only install scripts from sources you trust.</p>
    </div>
  </div>

  <script>
    const REPO_URL = 'cyanide-repotweaks.json';

    const downloadSvg = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    const codeSvg = '<svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
    const copySvg = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function load() {
      const container = document.getElementById('tweaks');
      try {
        const resp = await fetch(REPO_URL + '?_=' + Date.now());
        const data = await resp.json();
        const tweaks = data.tweaks || [];
        if (tweaks.length === 0) {
          container.innerHTML = '<div class="loading">No tweaks found.</div>';
          return;
        }

        container.innerHTML = '';
        tweaks.forEach(t => {
          const name = escHtml(t.name || t.id);
          const version = escHtml(t.version || '');
          const author = escHtml(t.author || data.author || '');
          const desc = escHtml(t.description || '');
          const scriptURL = t.scriptURL || '';

          const card = document.createElement('div');
          card.className = 'tweak-card';
          card.innerHTML = `
            <div class="tweak-header">
              <span class="tweak-name">${name}</span>
              <span class="tweak-version">v${version}</span>
            </div>
            <div class="tweak-author">by ${author}</div>
            ${desc ? `<div class="tweak-desc">${desc}</div>` : ''}
            <div class="tweak-actions">
              <a class="tweak-btn" href="${escHtml(scriptURL)}" target="_blank">${codeSvg} View Source</a>
              <a class="tweak-btn" href="${escHtml(scriptURL)}" download>${downloadSvg} Download .js</a>
              <button class="tweak-btn copy-btn" data-url="${escHtml(scriptURL)}">${copySvg} Copy URL</button>
            </div>
          `;
          container.appendChild(card);
        });

        container.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const url = btn.dataset.url;
            try {
              await navigator.clipboard.writeText(url);
              const orig = btn.innerHTML;
              btn.innerHTML = '✓ Copied';
              setTimeout(() => { btn.innerHTML = orig; }, 1500);
            } catch {}
          });
        });
      } catch (e) {
        container.innerHTML = '<div class="loading">Failed to load tweaks.</div>';
      }
    }

    load();
  </script>
</body>
</html>
